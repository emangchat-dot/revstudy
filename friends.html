<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Friends</title>
</head>

<body>

<h1>🌟 RevStudy Friends & Leaderboard</h1>

<div>
    <input type="text" id="username" placeholder="Your name">
    <button onclick="addUser()">Join</button>
</div>

<ul id="leaderboard"></ul>

<script>
const apiURL = "https://69ca1193ba5984c44bf28521.mockapi.io/users";

async function loadLeaderboard() {
    try {
        const res = await fetch(apiURL);
        const data = await res.json();

        const list = document.getElementById("leaderboard");
        list.innerHTML = "";

        data.sort((a, b) => Number(b.xp || 0) - Number(a.xp || 0));

        data.forEach(user => {
            const li = document.createElement("li");
            li.textContent = `${user.username || "Unknown"} - ${user.xp || 0} XP`;
            list.appendChild(li);
        });

    } catch (err) {
        console.error(err);
    }
}

async function addUser() {
    const username = document.getElementById("username").value.trim();
    if (!username) return;

    await fetch(apiURL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, xp: 0 })
    });

    loadLeaderboard();
}

loadLeaderboard();
setInterval(loadLeaderboard, 3000);
</script>

</body>
</html>
