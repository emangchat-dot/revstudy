<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RevStudy - Friends</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; }
        .box { background: #f0f4f8; padding: 20px; margin: 15px auto; width: 320px; border-radius: 12px; }
        button { padding: 10px; margin: 5px; border-radius: 8px; border: none; cursor: pointer; background-color: #4CAF50; color: white; }
        input { padding: 8px; width: 70%; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 10px; }
        ul { list-style: none; padding: 0; }
        li { margin: 8px 0; }
    </style>
</head>
<body>

<h1>🌟 RevStudy Friends & Leaderboard</h1>

<div class="box">
    <h3>Enter Your Username</h3>
    <input type="text" id="username" placeholder="Your name">
    <button id="joinBtn">Join</button>
</div>

<div class="box">
    <h3>🏆 Leaderboard</h3>
    <ul id="leaderboard"></ul>
</div>

<button onclick="goHome()">🏠 Back to Home</button>

<script>
const apiURL = "https://69ca1193ba5984c44bf28521.mockapi.io/users";

// Go home
function goHome() {
    window.location.href = "index.html";
}

// Load leaderboard
async function loadLeaderboard() {
    try {
        const res = await fetch(apiURL);
        const data = await res.json();

        const list = document.getElementById("leaderboard");
        list.innerHTML = "";

        // Sort descending by XP
        data.sort((a, b) => Number(b.xp || 0) - Number(a.xp || 0));

        data.forEach(user => {
            const li = document.createElement("li");
            li.textContent = `${user.username || "Unknown"} - ${user.xp || 0} XP`;
            list.appendChild(li);
        });
    } catch (err) {
        console.error("Leaderboard error:", err);
        document.getElementById("leaderboard").innerHTML = "<li>⚠️ Failed to load leaderboard</li>";
    }
}

// Add user
async function addUser() {
    const username = document.getElementById("username").value.trim();
    if (!username) return alert("Enter a username!");

    try {
        const res = await fetch(apiURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, xp: 0 })
        });
        const newUser = await res.json();

        // Save userId for study.html
        localStorage.setItem("userId", newUser.id);

        document.getElementById("username").value = "";
        loadLeaderboard();
    } catch (err) {
        console.error("Failed to add user:", err);
        alert("Error adding user");
    }
}

// Event listener for join button
document.getElementById("joinBtn").addEventListener("click", addUser);

// Auto-refresh leaderboard every 3 seconds
window.addEventListener("DOMContentLoaded", () => {
    loadLeaderboard();
    setInterval(loadLeaderboard, 3000);
});
</script>

</body>
</html>
