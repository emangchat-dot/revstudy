<script>
const apiURL = "https://69ca1193ba5984c44bf28521.mockapi.io/users";

function goHome() {
    window.location.href = "index.html";
}

// 🔄 Load leaderboard
async function loadLeaderboard() {
    try {
        const res = await fetch(apiURL);
        const data = await res.json();

        const list = document.getElementById("leaderboard");
        if (!list) return;

        list.innerHTML = "";

        // Sort by XP
        data.sort((a, b) => Number(b.xp || 0) - Number(a.xp || 0));

        data.forEach(user => {
            const li = document.createElement("li");

            // Text
            const text = document.createElement("span");
            text.textContent = `${user.username || "Unknown"} - ${user.xp || 0} XP`;

            // Button
            const btn = document.createElement("button");
            btn.textContent = "+10 XP";

            btn.addEventListener("click", () => {
                addXP(user.id, 10);
            });

            li.appendChild(text);
            li.appendChild(document.createTextNode(" "));
            li.appendChild(btn);

            list.appendChild(li);
        });

    } catch (err) {
        console.error("Leaderboard error:", err);

        const list = document.getElementById("leaderboard");
        if (list) {
            list.innerHTML = "<li>⚠️ Failed to load leaderboard</li>";
        }
    }
}

// ➕ Add new user
async function addUser() {
    const username = document.getElementById("username").value.trim();
    if (!username) return alert("Enter a username!");

    try {
        await fetch(apiURL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ username: username, xp: 0 })
        });

        document.getElementById("username").value = "";
        loadLeaderboard();

    } catch (err) {
        console.error("Add user failed:", err);
    }
}

// ⭐ Update XP
async function addXP(userId, amount) {
    try {
        const res = await fetch(`${apiURL}/${userId}`);
        const user = await res.json();

        const newXP = Number(user.xp || 0) + amount;

        await fetch(`${apiURL}/${userId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ xp: newXP })
        });

        loadLeaderboard();

    } catch (err) {
        console.error("XP update failed:", err);
    }
}

// 🚀 Start app
window.onload = () => {
    loadLeaderboard();
    setInterval(loadLeaderboard, 3000); // auto refresh
};
</script>
