<script>
const apiURL = "https://69ca1193ba5984c44bf28521.mockapi.io/users";

function goHome() { window.location.href = "index.html"; }

// Fetch and display leaderboard
async function loadLeaderboard() {
    try {
        const res = await fetch(apiURL);
        const data = await res.json();
        const list = document.getElementById("leaderboard");
        list.innerHTML = "";

        // Sort by XP descending (ensure numbers)
        data.sort((a, b) => Number(b.xp) - Number(a.xp));

        data.forEach(user => {
            const li = document.createElement("li");
            li.textContent = `${user.username} - ${user.xp} XP`;
            list.appendChild(li);
        });
    } catch (err) {
        console.error("Error loading leaderboard:", err);
    }
}

// Add user
async function addUser() {
    const username = document.getElementById("username").value.trim();
    if (!username) return alert("Enter a username!");

    await fetch(apiURL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username: username, xp: 0 })
    });

    document.getElementById("username").value = "";
    loadLeaderboard();
}

// Initial load
loadLeaderboard();

// 🔄 Auto refresh every 3 seconds
setInterval(loadLeaderboard, 3000);
</script>
