<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Boost Your Study Game</title>
    <meta name="description" content="RevStudy is the ultimate study app for students! Focus Mode, Ambient Mode, AI study tools, and personalized experience.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            color: #fff;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }

        p {
            font-size: 24px;
            max-width: 600px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
        }

        button {
            background-color: #ffcb05;
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 2px 6px 16px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .container {
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📚 RevStudy</div>
        <h1>Study Smarter, Not Harder</h1>
        <p>RevStudy is your all-in-one study companion with Focus Mode, Ambient Mode, AI study tools, customizable backgrounds, and more! Boost your productivity and track your progress effortlessly.</p>
        <button onclick="startApp()">Start Studying</button>
    </div>

    <script>
        function startApp() {
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
