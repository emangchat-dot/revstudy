<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Journal</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .notebook {
            background: #fff;
            color: black;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            height: 300px;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            line-height: 25px;
            padding: 10px;

            /* notebook lines */
            background: repeating-linear-gradient(
                white,
                white 24px,
                #d3d3d3 25px
            );

            font-family: 'Courier New', monospace;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            font-size: 14px;
        }

        .date {
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>

<h1>📓 My Journal</h1>

<div class="container">
    <div class="notebook">

        <div class="date" id="date"></div>

        <textarea id="journalText" placeholder="Write your thoughts here..."></textarea>

        <div class="buttons">
            <button onclick="saveEntry()">💾 Save</button>
            <button onclick="loadEntry()">📂 Load</button>
            <button onclick="clearEntry()">🗑️ Clear</button>
            <button onclick="goHome()">🏠 Home</button>
        </div>

    </div>
</div>

<script>
// DATE
function updateDate() {
    const now = new Date();
    document.getElementById("date").textContent =
        now.toDateString();
}
updateDate();

// SAVE
function saveEntry() {
    const text = document.getElementById("journalText").value;
    localStorage.setItem("journalEntry", text);
    alert("Saved!");
}

// LOAD
function loadEntry() {
    const saved = localStorage.getItem("journalEntry") || "";
    document.getElementById("journalText").value = saved;
}

// CLEAR
function clearEntry() {
    document.getElementById("journalText").value = "";
    localStorage.removeItem("journalEntry");
}

// NAV
function goHome() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
