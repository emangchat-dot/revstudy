<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Focus Mode</title>
    <!-- Google Fonts for artistic style -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
            opacity: 0;
            background-size: cover;
            background-position: center;
        }

        body.loaded { opacity: 1; }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 50px;
            margin-bottom: 20px;
        }

        .box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            margin: 20px;
            width: 300px;
            border-radius: 12px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        input {
            padding: 8px;
            margin: 5px 0;
            width: 80px;
            border-radius: 6px;
            border: none;
            text-align: center;
        }
    </style>
</head>
<body>

<h1>🎯 Focus Mode</h1>
<button onclick="goHome()">🏠 Home</button>

<div class="box">
    <h3>⏱️ Study Timer</h3>
    <input type="number" id="studyTime" placeholder="Study min">
    <input type="number" id="breakTime" placeholder="Break min">
    <button onclick="startTimer()">Start</button>
    <p id="timer">00:00</p>
</div>

<script>
window.onload = () => document.body.classList.add("loaded");

// Home navigation
function goHome(){
    document.body.classList.remove("loaded");
    setTimeout(()=> window.location.href="index.html",300);
}

// Timer logic
let timerInterval;
function startTimer(){
    let study = parseInt(document.getElementById("studyTime").value) * 60;
    let brk = parseInt(document.getElementById("breakTime").value) * 60;
    runTimer(study, () => {
        alert("Break Time!");
        runTimer(brk);
    });
}

function runTimer(time, callback){
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        let m = Math.floor(time/60);
        let s = time % 60;
        document.getElementById("timer").textContent =
            `${m}:${s<10?"0":""}${s}`;
        if(time <= 0){
            clearInterval(timerInterval);
            if(callback) callback();
        }
        time--;
    },1000);
}

// AI-style background images
let aiBackgrounds = [
  "https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1542281286-9e0a16bb7366?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1521747116042-5a810fda9664?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1535223289827-42f1e9919769?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1517487881594-2787fef5ebf7?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1508973378895-8aa3fb506dee?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1523206489230-c012d5a02f62?auto=format&fit=crop&w=1470&q=80"
];

let bgIndex = 0;
function changeBackground(){
    document.body.style.backgroundImage =
      `url('${aiBackgrounds[bgIndex]}')`;
    bgIndex = (bgIndex + 1) % aiBackgrounds.length;
}
changeBackground();
setInterval(changeBackground, 15000);
</script>

</body>
</html>
