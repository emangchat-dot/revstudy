<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Focus Mode</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
            opacity: 0;
            background-size: cover;
            background-position: center;
        }

        body.loaded { opacity: 1; }

        h1 { font-size: 40px; margin-bottom: 20px; }

        .box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            margin: 20px;
            width: 300px;
            border-radius: 12px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🎯 Focus Mode</h1>
<button onclick="goHome()">🏠 Home</button>

<div class="box">
    <h3>⏱️ Study Timer</h3>
    <input type="number" id="studyTime" placeholder="Study minutes">
    <input type="number" id="breakTime" placeholder="Break minutes">
    <button onclick="startTimer()">Start</button>
    <p id="timer">00:00</p>
</div>

<script>
window.onload = () => document.body.classList.add("loaded");

function goHome(){
    document.body.classList.remove("loaded");
    setTimeout(()=> window.location.href="index.html",300);
}

// Timer
let timerInterval;

function startTimer(){
    let study = document.getElementById("studyTime").value * 60;
    let brk = document.getElementById("breakTime").value * 60;

    runTimer(study, () => {
        alert("Break Time!");
        runTimer(brk);
    });
}

function runTimer(time, callback){
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        let m = Math.floor(time/60);
        let s = time%60;
        document.getElementById("timer").textContent = `${m}:${s<10?"0":""}${s}`;
        time--;
        if(time<0){
            clearInterval(timerInterval);
            if(callback) callback();
        }
    },1000);
}

// 🌌 AI Art Backgrounds
let aiBackgrounds = [
    "https://images.unsplash.com/photo-1507525428034-b723cf961d3e", // dreamy landscape
    "https://unsplash.com/photos/a-black-background-with-orange-and-blue-lines-Iv72UJCnpTw", // cosmic AI art
    "https://images.unsplash.com/photo-1601075569134-ff3a62f20e20", // abstract digital
    "https://images.unsplash.com/photo-1593642634367-d91a135587b5"  // futuristic city
];

let bgIndex = 0;

function changeBackground(){
    document.body.style.backgroundImage = `url('${aiBackgrounds[bgIndex]}')`;
    bgIndex = (bgIndex + 1) % aiBackgrounds.length;
}

// Change background every 15 seconds
changeBackground();
setInterval(changeBackground, 15000);
</script>

</body>
</html>
