<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Ambient Mode</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* BACKGROUND LAYER */
        #bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -3;
            transition: background-image 1s ease-in-out;
        }

        /* GRADIENT OVERLAY */
        #gradient {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            opacity: 0.5;
            z-index: -2;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* PARTICLES */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .overlay {
            padding: 20px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin: 15px auto;
            width: 320px;
            border-radius: 15px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
    </style>
</head>

<body>

<div id="bg"></div>
<div id="gradient"></div>
<canvas id="particles"></canvas>

<div class="overlay">

<h1>🌌 RevStudy Ambient Mode</h1>

<button onclick="goHome()">🏠 Home</button>
<button onclick="changeBackground()">🎨 Change Background</button>

<!-- AI QUESTION -->
<div class="box">
    <h3>🧠 AI Question</h3>
    <p id="questionBox">Click generate</p>
    <button onclick="generateQuestion()">Generate</button>
</div>

<!-- MUSIC PLAYER -->
<div class="box">
    <h3>🎧 Music</h3>
    <audio controls loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    </audio>
</div>

<!-- HEATMAP -->
<div class="box">
    <h3>📊 Study Heatmap</h3>
    <div id="heatmap"></div>
</div>

<!-- FUTURE -->
<div class="box">
    <h3>📈 Future You</h3>
    <p id="futureText"></p>
    <button onclick="predictFuture()">Predict</button>
</div>

<!-- FEEDBACK -->
<div class="box">
    <h3>🤖 Feedback</h3>
    <p id="aiFeedback"></p>
    <button onclick="generateFeedback()">Get Feedback</button>
</div>

</div>

<script>
// NAV
function goHome() {
    window.location.href = "index.html";
}

// BACKGROUNDS
const backgrounds = [
"https://images.unsplash.com/photo-1506744038136-46273834b3fb",
"https://images.unsplash.com/photo-1499084732479-de2c02d45fc4",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
"https://images.unsplash.com/photo-1501785888041-af3ef285b470"
];

let currentBg = 0;

function setBackground(i) {
    document.getElementById("bg").style.backgroundImage = `url('${backgrounds[i]}')`;
}

function changeBackground() {
    currentBg = (currentBg + 1) % backgrounds.length;
    setBackground(currentBg);
}

setInterval(changeBackground, 20000);
setBackground(currentBg);

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: Math.random()-0.5,
        dy: Math.random()-0.5
    });
}

function animateParticles() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// AI (REPLIT)
async function generateQuestion() {
    try {
        const res = await fetch("https://revstudy-ai--emangchat.replit.app", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                topic: "student mental health issues",
                type: "multiple-choice",
                number: 1
            })
        });
        const data = await res.json();
        if(data && data.question) {
            document.getElementById("questionBox").textContent = data.question;
        } else {
            document.getElementById("questionBox").textContent = "No question returned.";
            console.log(data);
        }
    } catch (err) {
        console.error(err);
        document.getElementById("questionBox").textContent = "Error generating question.";
    }
}

// HEATMAP
function loadHeatmap() {
    let data = JSON.parse(localStorage.getItem("studyData")) || {};
    let heat = document.getElementById("heatmap");
    heat.innerHTML = "";

    for (let d in data) {
        let div = document.createElement("div");
        div.textContent = d + ": " + data[d] + " min";
        heat.appendChild(div);
    }
}
loadHeatmap();

// FUTURE
function predictFuture() {
    let data = JSON.parse(localStorage.getItem("studyData")) || {};
    let total = 0, days = 0;

    for (let d in data) {
        total += data[d];
        days++;
    }

    let avg = days ? total/days : 0;

    document.getElementById("futureText").textContent =
        "You could study " + Math.round(avg*30) + " mins next month 🚀";
}

// FEEDBACK
function generateFeedback() {
    let xp = localStorage.getItem("xp") || 0;

    let text = xp < 50 ? "Start strong!" :
               xp < 150 ? "Good progress!" :
               "You're elite 🔥";

    document.getElementById("aiFeedback").textContent = text;
}
</script>

</body>
</html>
