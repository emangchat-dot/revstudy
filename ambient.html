<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RevStudy - Ambient Mode</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">
    <!-- Chart.js for Future-You Predictor -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-size: cover;
            background-position: center;
            transition: opacity 0.5s;
            opacity: 0;
        }
        body.loaded { opacity: 1; }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 50px;
            margin: 20px 0;
        }

        /* Tabs */
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: rgba(0,0,0,0.5); margin: 0 5px; border-radius: 8px; transition: background 0.3s; }
        .tab.active { background: rgba(255,255,255,0.3); }

        /* Content */
        .tab-content { display: none; width: 90%; max-width: 800px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .tab-content.active { display: block; }

        .feature-box { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0; border-radius: 10px; }

        button { padding: 8px 15px; margin-top: 10px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Poppins', sans-serif; }

        /* Heatmap */
        .heatmap-grid { display: grid; grid-template-columns: repeat(7, 40px); grid-gap: 5px; justify-content: center; }
        .heatmap-cell { width: 40px; height: 40px; border-radius: 4px; background: rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer; }
    </style>
</head>
<body>

<h1>🌌 RevStudy - Ambient Mode</h1>

<!-- Tabs -->
<div class="tabs">
    <div class="tab active" data-tab="1">Future-You</div>
    <div class="tab" data-tab="2">Heatmap</div>
    <div class="tab" data-tab="3">AI Questions</div>
    <div class="tab" data-tab="4">Mistakes & Feedback</div>
    <div class="tab" data-tab="5">Study Stats</div>
</div>

<!-- Tab Contents -->
<div id="tab-1" class="tab-content active">
    <div class="feature-box">
        <canvas id="futureChart" width="400" height="200"></canvas>
    </div>
</div>

<div id="tab-2" class="tab-content">
    <div class="feature-box heatmap-grid" id="heatmapGrid"></div>
</div>

<div id="tab-3" class="tab-content">
    <div class="feature-box">
        <button onclick="generateQuestion()">Generate Question</button>
        <p id="aiQuestion">Your question will appear here.</p>
    </div>
</div>

<div id="tab-4" class="tab-content">
    <div id="mistakeBox" class="feature-box">No mistakes yet.</div>
    <button onclick="addMistake('Forgot formula in Math')">Add Mistake</button>
</div>

<div id="tab-5" class="tab-content">
    <div id="studyStat" class="feature-box">Total Study: 0 min</div>
    <input type="number" id="studyInput" placeholder="Minutes studied">
    <button onclick="addStudyFromInput()">Add Study</button>
</div>

<script>
// Fade in
window.onload = () => document.body.classList.add("loaded");

// Tabs
const tabs = document.querySelectorAll(".tab");
const contents = document.querySelectorAll(".tab-content");
tabs.forEach(tab=>{
    tab.addEventListener("click", ()=>{
        tabs.forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        contents.forEach(c=>c.classList.remove("active"));
        document.getElementById("tab-"+tab.dataset.tab).classList.add("active");
    });
});

// AI Painting Backgrounds
let aiBackgrounds = [
  "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1521747116042-5a810fda9664?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=1470&q=80",
  "https://images.unsplash.com/photo-1535223289827-42f1e9919769?auto=format&fit=crop&w=1470&q=80"
];
let bgIndex=0;
function changeBackground(){
    document.body.style.backgroundImage=`url('${aiBackgrounds[bgIndex]}')`;
    bgIndex=(bgIndex+1)%aiBackgrounds.length;
}
changeBackground();
setInterval(changeBackground,20000);

// --- Future-You Predictor ---
const ctx = document.getElementById('futureChart').getContext('2d');
const futureChart = new Chart(ctx,{type:'line',data:{
    labels:['Week 1','Week 2','Week 3','Week 4','Week 5'],
    datasets:[{
        label:'Projected Progress',
        data:[2,4,6,8,10],
        borderColor:'rgba(255,255,255,0.8)',
        backgroundColor:'rgba(255,255,255,0.2)',
        tension:0.3
    }]
},options:{responsive:true,plugins:{legend:{display:true,labels:{color:'white'}}},scales:{y:{ticks:{color:'white'}},x:{ticks:{color:'white'}}}}});

// --- Heatmap ---
const heatmapGrid = document.getElementById('heatmapGrid');
let today = new Date();
let storedData = JSON.parse(localStorage.getItem('studyData') || '{}');

// Generate 35 days (5 weeks)
for(let i=34;i>=0;i--){
    let day = new Date();
    day.setDate(today.getDate()-i);
    let dayKey = day.toISOString().split('T')[0];
    let minutes = storedData[dayKey] || 0;
    let cell = document.createElement('div');
    cell.classList.add('heatmap-cell');
    let intensity = Math.min(minutes/120,1); // assume max 120 min for color scale
    cell.style.backgroundColor = `rgba(0,255,0,${intensity})`;
    cell.title = `${dayKey}: ${minutes} min`;
    heatmapGrid.appendChild(cell);
}

// --- AI Question Creator ---
function generateQuestion(){
    const topics=["Math","Science","English","History"];
    const questions=["Explain the theory in 3 sentences.","Solve this problem: 12 + 7 × 3","Define the term and give an example.","Summarize this concept in your own words."];
    const topic=topics[Math.floor(Math.random()*topics.length)];
    const question=questions[Math.floor(Math.random()*questions.length)];
    document.getElementById('aiQuestion').textContent=`Topic: ${topic} | Question: ${question}`;
}

// --- Mistakes & Feedback ---
let mistakes=[];
function addMistake(text){
    mistakes.push(text);
    const box=document.getElementById('mistakeBox');
    box.innerHTML=mistakes.map((m,i)=>`#${i+1}: ${m}`).join('<br>');
}

// --- Study Time Stats ---
let totalStudy = Object.values(storedData).reduce((a,b)=>a+b,0);
document.getElementById('studyStat').textContent=`Total Study: ${totalStudy} min`;

function addStudyFromInput(){
    let input = parseInt(document.getElementById('studyInput').value);
    if(!input) return;
    let dayKey = today.toISOString().split('T')[0];
    storedData[dayKey] = (storedData[dayKey] || 0) + input;
    localStorage.setItem('studyData', JSON.stringify(storedData));
    // update heatmap and total
    totalStudy += input;
    document.getElementById('studyStat').textContent=`Total Study: ${totalStudy} min`;
    // update today's cell
    heatmapGrid.innerHTML='';
    for(let i=34;i>=0;i--){
        let day = new Date();
        day.setDate(today.getDate()-i);
        let dKey = day.toISOString().split('T')[0];
        let min = storedData[dKey] || 0;
        let cell = document.createElement('div');
        cell.classList.add('heatmap-cell');
        let intensity = Math.min(min/120,1);
        cell.style.backgroundColor = `rgba(0,255,0,${intensity})`;
        cell.title = `${dKey}: ${min} min`;
        heatmapGrid.appendChild(cell);
    }
}
</script>

</body>
</html>
