<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Ambient Mode</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }
        #bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -3;
            transition: background-image 1s ease-in-out;
        }
        #gradient {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            opacity: 0.7;
            z-index: -2;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .overlay { padding: 20px; }
        .box {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 20px;
            margin: 15px auto;
            width: 320px;
            border-radius: 15px;
        }
        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
        input[type="text"] {
            padding: 8px;
            border-radius: 8px;
            border: none;
            width: 80%;
            margin-bottom: 10px;
            font-size: 14px;
        }
        iframe {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>

<div id="bg"></div>
<div id="gradient"></div>
<canvas id="particles"></canvas>

<div class="overlay">

<h1>🌌 RevStudy Ambient Mode</h1>

<button onclick="goHome()">🏠 Home</button>
<button onclick="changeBackground()">🎨 Change Background</button>

<!-- CLOCK -->
<div class="box">
    <h3>⏰ Time</h3>
    <h2 id="clock"></h2>
</div>

<!-- TIMER -->
<div class="box">
    <h3>🍅 Focus Timer</h3>
    <h2 id="timer">25:00</h2>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
</div>

<!-- AI QUESTION -->
<div class="box">
    <h3>🧠 AI Question</h3>
    <input type="text" id="topicInput" placeholder="Enter a topic">
    <p id="questionBox">Enter a topic and click generate</p>
    <button onclick="generateQuestion()">Generate</button>
</div>

<!-- LOFI -->
<div class="box">
    <h3>🎧 Lofi Stations</h3>
    <button onclick="setLofi(1)">Chill</button>
    <button onclick="setLofi(2)">Sleep</button>
    <button onclick="setLofi(3)">Focus</button>
    <iframe id="spotifyPlayer" width="100%" height="152"></iframe>
</div>

<!-- 🌐 PORTAL -->
<div class="box">
    <h3>🌐 Study Portal</h3>

    <input type="text" id="siteInput" placeholder="Enter website URL">
    <button onclick="loadSite()">Go</button>

    <br><br>

    <button onclick="loadYouTube()">📺 YouTube</button>
    <button onclick="loadRadio()">📻 Radio</button>

    <iframe id="portalFrame" width="100%" height="200"></iframe>

    <audio id="radioPlayer" controls style="width:100%; display:none;"></audio>
</div>

<!-- HEATMAP -->
<div class="box">
    <h3>📊 Study Heatmap</h3>
    <div id="heatmap"></div>
</div>

<!-- FUTURE -->
<div class="box">
    <h3>📈 Future You</h3>
    <p id="futureText"></p>
    <button onclick="predictFuture()">Predict</button>
</div>

<!-- FEEDBACK -->
<div class="box">
    <h3>🤖 Feedback</h3>
    <p id="aiFeedback"></p>
    <button onclick="generateFeedback()">Get Feedback</button>
</div>

</div>

<script>
// NAV
function goHome(){ window.location.href="index.html"; }

// BACKGROUND
const backgrounds=[
"https://images.unsplash.com/photo-1506744038136-46273834b3fb",
"https://images.unsplash.com/photo-1499084732479-de2c02d45fc4",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
"https://images.unsplash.com/photo-1501785888041-af3ef285b470"
];
let currentBg=0;
function setBackground(i){ document.getElementById("bg").style.backgroundImage=`url('${backgrounds[i]}')`; }
function changeBackground(){ currentBg=(currentBg+1)%backgrounds.length; setBackground(currentBg); }
setInterval(changeBackground,20000); setBackground(currentBg);

// CLOCK
setInterval(()=>{ document.getElementById("clock").textContent=new Date().toLocaleTimeString(); },1000);

// TIMER
let time=1500,interval;
function startTimer(){
clearInterval(interval);
interval=setInterval(()=>{
if(time<=0)return clearInterval(interval);
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").textContent=`${m}:${s.toString().padStart(2,'0')}`;
},1000);
}
function resetTimer(){ clearInterval(interval); time=1500; document.getElementById("timer").textContent="25:00"; }

// LOFI
function setLofi(t){
const p=document.getElementById("spotifyPlayer");
const list={
1:"https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS",
2:"https://open.spotify.com/embed/playlist/37i9dQZF1DWZd79rJ6a7lp",
3:"https://open.spotify.com/embed/playlist/37i9dQZF1DX3PFzdbtx1Us"
};
p.src=list[t];
}
setLofi(1);

// PORTAL
function loadSite(){
let url=document.getElementById("siteInput").value;
if(!url.startsWith("http")) url="https://"+url;
document.getElementById("portalFrame").style.display="block";
document.getElementById("radioPlayer").style.display="none";
document.getElementById("portalFrame").src=url;
}

function loadYouTube(){
document.getElementById("portalFrame").style.display="block";
document.getElementById("radioPlayer").style.display="none";
document.getElementById("portalFrame").src="https://www.youtube.com/embed/jfKfPfyJRdk";
}

// ✅ FIXED RADIO
function loadRadio(){
const audio=document.getElementById("radioPlayer");
audio.style.display="block";
document.getElementById("portalFrame").style.display="none";

// working stream
audio.src="https://icecast.radiofrance.fr/fip-midfi.mp3";
audio.play();
}

// HEATMAP
function loadHeatmap(){
let data=JSON.parse(localStorage.getItem("studyData"))||{};
let heat=document.getElementById("heatmap"); heat.innerHTML="";
for(let d in data){
let div=document.createElement("div");
div.textContent=d+": "+data[d]+" min";
heat.appendChild(div);
}
}
loadHeatmap();

// FUTURE
function predictFuture(){
let data=JSON.parse(localStorage.getItem("studyData"))||{};
let total=0,days=0;
for(let d in data){ total+=data[d]; days++; }
let avg=days?total/days:0;
document.getElementById("futureText").textContent="You could study "+Math.round(avg*30)+" mins next month 🚀";
}

// FEEDBACK
function generateFeedback(){
let xp=localStorage.getItem("xp")||0;
let text=xp<50?"Start strong!":xp<150?"Good progress!":"You're elite 🔥";
document.getElementById("aiFeedback").textContent=text;
}
</script>

</body>
</html>
