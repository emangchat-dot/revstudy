<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Ambient Mode</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }
        #bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -3;
        }
        #gradient {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            opacity: 0.7;
            z-index: -2;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .overlay { padding: 20px; }
        .box {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 20px;
            margin: 15px auto;
            width: 320px;
            border-radius: 15px;
        }
        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
        iframe {
            border-radius: 10px;
            border: none;
        }
        input {
            padding: 8px;
            border-radius: 8px;
            border: none;
            width: 80%;
        }
    </style>
</head>
<body>

<div id="bg"></div>
<div id="gradient"></div>

<div class="overlay">

<h1>🌌 RevStudy Ambient Mode</h1>

<button onclick="goHome()">🏠 Home</button>
<button onclick="changeBackground()">🎨 Change Background</button>

<!-- CLOCK -->
<div class="box">
    <h3>⏰ Time</h3>
    <h2 id="clock"></h2>
</div>

<!-- TIMER -->
<div class="box">
    <h3>🍅 Focus Timer</h3>
    <h2 id="timer">25:00</h2>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
</div>

<!-- LOFI -->
<div class="box">
    <h3>🎧 Lofi</h3>
    <button onclick="setLofi()">Play</button>
    <iframe id="spotifyPlayer" width="100%" height="152"></iframe>
</div>

<!-- 🌐 PORTAL -->
<div class="box">
    <h3>🌐 Study Portal</h3>

    <input type="text" id="siteInput" placeholder="Enter URL">
    <button onclick="loadSite()">Go</button>

    <br><br>

    <button onclick="loadYouTube()">📺 YouTube</button>

    <iframe id="portalFrame" width="100%" height="200"></iframe>
</div>

<!-- 📻 RADIO -->
<div class="box">
    <h3>📻 Radio Stations</h3>

    <button onclick="playStation('https://icecast.radiofrance.fr/fip-midfi.mp3')">🎷 Jazz</button>
    <button onclick="playStation('https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one')">🔥 Pop</button>
    <button onclick="playStation('https://playerservices.streamtheworld.com/api/livestream-redirect/KEXP_MP3.mp3')">🎸 Indie</button>
    <button onclick="playStation('https://stream.live.vc.bbcmedia.co.uk/bbc_radio_three')">🎻 Classical</button>

    <audio id="radioPlayer" controls style="width:100%; margin-top:10px;"></audio>
</div>

</div>

<script>

// NAV
function goHome(){ window.location.href="index.html"; }

// BACKGROUND
const backgrounds=[
"https://images.unsplash.com/photo-1506744038136-46273834b3fb",
"https://images.unsplash.com/photo-1499084732479-de2c02d45fc4",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e"
];
let bg=0;
function changeBackground(){
bg=(bg+1)%backgrounds.length;
document.getElementById("bg").style.backgroundImage=`url('${backgrounds[bg]}')`;
}
changeBackground();

// CLOCK
setInterval(()=>{
document.getElementById("clock").textContent=new Date().toLocaleTimeString();
},1000);

// TIMER
let time=1500,interval;
function startTimer(){
clearInterval(interval);
interval=setInterval(()=>{
if(time<=0)return clearInterval(interval);
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").textContent=`${m}:${s.toString().padStart(2,'0')}`;
},1000);
}
function resetTimer(){
clearInterval(interval);
time=1500;
document.getElementById("timer").textContent="25:00";
}

// LOFI
function setLofi(){
document.getElementById("spotifyPlayer").src=
"https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS";
}

// PORTAL
function loadSite(){
let url=document.getElementById("siteInput").value;
if(!url.startsWith("http")) url="https://"+url;
document.getElementById("portalFrame").src=url;
}

function loadYouTube(){
document.getElementById("portalFrame").src=
"https://www.youtube.com/embed/jfKfPfyJRdk";
}

// 🎛️ RADIO SYSTEM
function playStation(url){
const audio=document.getElementById("radioPlayer");
audio.src=url;
audio.play();
}

</script>

</body>
</html>
