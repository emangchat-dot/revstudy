<!DOCTYPE html>
<html>
<head>
    <title>RevStudy - Ambient Mode</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        #bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -3;
            transition: background-image 1s ease-in-out;
        }

        #gradient {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            opacity: 0.7;
            z-index: -2;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .overlay { padding: 20px; }

        .box {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 20px;
            margin: 15px auto;
            width: 340px;
            border-radius: 15px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }

        input[type="text"] {
            padding: 8px;
            border-radius: 8px;
            border: none;
            width: 80%;
            margin-bottom: 10px;
            font-size: 14px;
        }

        iframe {
            border-radius: 12px;
            margin-top: 10px;
            width: 100%;
        }

        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="bg"></div>
<div id="gradient"></div>
<canvas id="particles"></canvas>

<div class="overlay">

<h1>🌌 RevStudy Ambient Mode</h1>

<button onclick="goHome()">🏠 Home</button>
<button onclick="changeBackground()">🎨 Change Background</button>

<!-- CLOCK -->
<div class="box">
    <h3>⏰ Time</h3>
    <h2 id="clock"></h2>
</div>

<!-- TIMER -->
<div class="box">
    <h3>🍅 Focus Timer</h3>
    <h2 id="timer">25:00</h2>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
</div>

<!-- AI QUESTION -->
<div class="box">
    <h3>🧠 AI Question</h3>
    <input type="text" id="topicInput" placeholder="Enter a topic">
    <p id="questionBox">Enter a topic and click generate</p>
    <button onclick="generateQuestion()">Generate</button>
</div>

<!-- SPOTIFY -->
<div class="box">
    <h3>🎧 Lofi Stations</h3>
    <button onclick="setLofi(1)">Chill</button>
    <button onclick="setLofi(2)">Sleep</button>
    <button onclick="setLofi(3)">Focus</button>
    <iframe id="spotifyPlayer" height="152"
        allow="autoplay; encrypted-media"></iframe>
</div>

<!-- PORTAL + MEDIA -->
<div class="box">
    <h3>🌐 Study Portal</h3>

    <input type="text" id="portalUrl" placeholder="Enter URL">
    <button onclick="loadPortal()">Go</button>
    <iframe id="portalFrame" height="200"></iframe>

    <hr>

    <h4>📺 YouTube Lofi</h4>
    <iframe 
        id="ytPlayer"
        height="180"
        src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&loop=1&playlist=jfKfPfyJRdk&controls=0"
        allow="autoplay">
    </iframe>

    <h4>📻 FM Radio</h4>
    <button onclick="playStation('https://icecast.radiofrance.fr/fip-midfi.mp3')">Jazz</button>
    <button onclick="playStation('https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one')">Pop</button>
    <button onclick="playStation('https://playerservices.streamtheworld.com/api/livestream-redirect/KEXP_MP3.mp3')">Indie</button>
    <button onclick="playStation('https://icecast.omroep.nl/radio4-bb-mp3')">Classical</button>

    <audio id="fmRadio" controls autoplay>
        <source src="https://icecast.radiofrance.fr/fip-midfi.mp3">
    </audio>
</div>

</div>

<script>
// NAV
function goHome() { window.location.href = "index.html"; }

// BACKGROUND
const backgrounds = [
    "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
    "https://images.unsplash.com/photo-1499084732479-de2c02d45fc4",
    "https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
    "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
];
let currentBg = 0;
function setBackground(i) {
    document.getElementById("bg").style.backgroundImage = `url('${backgrounds[i]}')`;
}
function changeBackground() {
    currentBg = (currentBg + 1) % backgrounds.length;
    setBackground(currentBg);
}
setInterval(changeBackground, 20000);
setBackground(currentBg);

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: Math.random()-0.5,
        dy: Math.random()-0.5
    });
}

function animateParticles() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// CLOCK
function updateClock() {
    document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// TIMER
let time = 1500, interval;
function startTimer() {
    clearInterval(interval);
    interval = setInterval(() => {
        if (time <= 0) return clearInterval(interval);
        time--;
        let m = Math.floor(time/60);
        let s = time % 60;
        document.getElementById("timer").textContent =
            `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
}
function resetTimer() {
    clearInterval(interval);
    time = 1500;
    document.getElementById("timer").textContent = "25:00";
}

// SPOTIFY
function setLofi(type) {
    const playlists = {
        1: "https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS",
        2: "https://open.spotify.com/embed/playlist/37i9dQZF1DWZd79rJ6a7lp",
        3: "https://open.spotify.com/embed/playlist/37i9dQZF1DX3PFzdbtx1Us"
    };
    document.getElementById("spotifyPlayer").src = playlists[type];
}
setLofi(1);

// PORTAL FIX
function loadPortal() {
    let url = document.getElementById("portalUrl").value.trim();
    if (!url) return;

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    const iframe = document.getElementById("portalFrame");
    iframe.src = url;

    setTimeout(() => {
        try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            if (!doc || doc.body.innerHTML.length === 0) {
                window.open(url, "_blank");
            }
        } catch {
            window.open(url, "_blank");
        }
    }, 1500);
}

// RADIO
function playStation(url) {
    const radio = document.getElementById("fmRadio");
    radio.src = url;
    radio.play();
}

// AI QUESTION (unchanged)
async function generateQuestion() {
    const topic = document.getElementById("topicInput").value.trim();
    if (!topic) return;
    document.getElementById("questionBox").textContent = "Generating...";
    try {
        const res = await fetch("https://revstudy-ai--emangchat.replit.app", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({topic})
        });
        const data = await res.json();
        document.getElementById("questionBox").textContent =
            data.question || "No question.";
    } catch {
        document.getElementById("questionBox").textContent = "Error.";
    }
}
</script>

</body>
</html>
