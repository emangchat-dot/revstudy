<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Tutoring & Help</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="page">

  <!-- HEADER -->
  <header class="header">
    <h1>🤖 AI Tutoring & Help</h1>
    <p>Ask questions, learn faster, and build flashcards</p>

    <a class="back-btn" href="index.html">⬅ Back to Home</a>
  </header>

  <!-- AI SECTION -->
  <section class="card glass">
    <h2>🧠 AI Tutor</h2>

    <div class="input-group">
      <input id="question" placeholder="Ask anything (math, science, etc)...">
      <button onclick="askAI()">Ask</button>
    </div>

    <div class="output" id="response">
      Your answer will appear here...
    </div>
  </section>

  <!-- FLASHCARDS SECTION -->
  <section class="card glass">
    <h2>📚 Flashcards</h2>

    <div class="input-grid">
      <input id="front" placeholder="Question">
      <input id="back" placeholder="Answer">
    </div>

    <button onclick="addFlashcard()">+ Add Flashcard</button>

    <div id="flashcardList" class="flashcard-grid"></div>
  </section>

  <script>

  document.addEventListener("DOMContentLoaded", function () {

    // ================= AI TUTOR =================
    window.askAI = async function () {
      let q = document.getElementById("question");
      let responseBox = document.getElementById("response");

      if (!q || !q.value.trim()) return;

      responseBox.innerText = "Thinking... 📚";

      try {
        const res = await fetch("https://revstudy-ai--emangchat.replit.app/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question: q.value.trim(),
            level: "beginner"
          })
        });

        if (!res.ok) {
          throw new Error("Server error: " + res.status);
        }

        const data = await res.json();

        responseBox.innerText = data.answer || "No response";

      } catch (err) {
        console.error(err);
        responseBox.innerText = "⚠️ AI temporarily unavailable. Try again later.";
      }
    };

    // ================= FLASHCARDS =================
    let flashcards = JSON.parse(localStorage.getItem("flashcards") || "[]");

    window.addFlashcard = function () {
      let front = document.getElementById("front");
      let back = document.getElementById("back");

      if (!front.value.trim() || !back.value.trim()) return;

      flashcards.push({
        front: front.value.trim(),
        back: back.value.trim()
      });

      localStorage.setItem("flashcards", JSON.stringify(flashcards));

      front.value = "";
      back.value = "";

      renderFlashcards();
    };

    window.flip = function (i) {
      let card = document.getElementById("card-" + i);
      if (!card) return;

      if (card.dataset.flipped === "true") {
        card.innerText = "❓ " + flashcards[i].front;
        card.dataset.flipped = "false";
      } else {
        card.innerText = "💡 " + flashcards[i].back;
        card.dataset.flipped = "true";
      }
    };

    function renderFlashcards() {
      let list = document.getElementById("flashcardList");
      if (!list) return;

      list.innerHTML = "";

      flashcards.forEach((c, i) => {
        list.innerHTML += `
          <div class="flashcard"
               id="card-${i}"
               onclick="flip(${i})"
               data-flipped="false">
            ❓ ${c.front}
          </div>
        `;
      });
    }

    renderFlashcards();

  });

  </script>

</body>
</html>
